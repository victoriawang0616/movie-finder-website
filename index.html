<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFind - Movie Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">CineFind</a>
            <div id="navLinks" class="d-flex gap-3">
            </div>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h1 class="display-4 fw-bold text-white">Find Your Next Favourite Movie</h1>
        
        <div class="row justify-content-center mt-4">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search a movie title...">
            </div>
            <div class="col-md-2">
                <button id="searchBtn" class="btn btn-primary btn-lg w-100">Search</button>
            </div>
        </div>

        <div class="mt-4">
            <div class="btn-group flex-wrap" role="group">
                <button class="btn btn-outline-secondary genre-filter active" data-genre="all">All</button>
                <button class="btn btn-outline-secondary genre-filter" data-genre="28">Action</button>
                <button class="btn btn-outline-secondary genre-filter" data-genre="35">Comedy</button>
                <button class="btn btn-outline-secondary genre-filter" data-genre="27">Horror</button>
                <button class="btn btn-outline-secondary genre-filter" data-genre="878">Sci-Fi</button>
                <button class="btn btn-outline-secondary genre-filter" data-genre="18">Drama</button>
                <button class="btn btn-outline-secondary genre-filter" data-genre="10749">Romance</button>
            </div>
        </div>

        <h2 class="text-white mt-5">Popular right now</h2>
        <div id="moviesGrid" class="row mt-4">
            <div class="col-12 text-white">Loading movies...</div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/movieService.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/watchlist.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
