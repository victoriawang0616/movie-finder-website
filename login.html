<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CineFind</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <nav class="navbar px-4">
    <a class="navbar-brand logo" href="index.html">CINE<span>FIND</span></a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Login to access your watchlist</p>

      <div id="errorMsg" class="alert alert-danger d-none"></div>
      <div id="successMsg" class="alert alert-success d-none"></div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="loginEmail" class="form-control dark-input" placeholder="you@email.com"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-control dark-input" placeholder="Enter your password"/>
      </div>

      <button class="btn btn-accent w-100 mt-2" onclick="loginUser()">Login</button>

      <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
